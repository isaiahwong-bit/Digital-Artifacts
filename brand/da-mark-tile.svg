<svg width="512" height="512" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Digital Artifacts tile lockup: green D-from-4-layers on a navy rounded
       tile. Use for favicon, app icon, nav logo, social avatar. -->
  <defs>
    <mask id="layers-tile">
      <rect x="0" y="0" width="100" height="100" fill="#ffffff"/>
      <rect x="0" y="32" width="100" height="3.6" fill="#000000"/>
      <rect x="0" y="48" width="100" height="3.6" fill="#000000"/>
      <rect x="0" y="64" width="100" height="3.6" fill="#000000"/>
    </mask>
  </defs>
  <rect width="120" height="120" rx="26" fill="#1B2838"/>
  <g transform="translate(4.35,7.5) scale(1.05)">
    <path d="M24,18 H52 A30,32 0 0 1 52,82 H24 Z M38,34 H50 A16,16 0 0 1 50,66 H38 Z"
          fill="#00C853" fill-rule="evenodd" mask="url(#layers-tile)"/>
  </g>
</svg>
